<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>eY Widgets - Home Command Centre</title>

    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="dashboard.css">

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard-container">

    <!-- ========================= -->
    <!-- Header                    -->
    <!-- ========================= -->

    <header class="dashboard-header">

        <h1 id="dashboard-title">
            Home Command Centre
        </h1>

        <p id="dashboard-subtitle">
            Family • Property • Business • Finance • Focus
        </p>

    </header>


    <!-- ========================= -->
    <!-- Widget Strip              -->
    <!-- ========================= -->

    <main id="widget-strip">

        <!-- Rendered by dashboard.js -->

    </main>


    <!-- ========================= -->
    <!-- Status Bar                -->
    <!-- ========================= -->

    <footer id="status-bar">

        <!-- Live Clock -->
        <div class="status-item">
            <span id="status-time">--:--</span>
        </div>

        <!-- Date -->
        <div class="status-item">
            <span id="status-date">Loading...</span>
        </div>

        <!-- Daily Message -->
        <div class="status-item">
            <span id="status-message">
                Tie your camel and trust in Allah.
            </span>
        </div>

        <!-- Location -->
        <div class="status-item">
            <span id="status-location">
                Leighton Buzzard, UK
            </span>
        </div>

    </footer>

</div>

<!-- Configuration must load first -->
<script src="config.js"></script>

<!-- Shared framework utilities -->
<script src="../src/core/app-version.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/error-handler.js"></script>
<script src="../src/core/icon-manager.js"></script>

<script src="../src/core/theme-manager.js"></script>
<script src="../src/core/widget-renderer.js"></script>
<script src="../src/core/status-bar.js"></script>

<script src="../src/services/api-client.js"></script>
<script src="../src/services/weather-service.js"></script>
<script src="../src/services/prayer-service.js"></script>
<script src="../src/services/currency-service.js"></script>
<script src="../src/services/calendar-service.js"></script>

<!-- Dashboard Logic -->
<script src="dashboard.js"></script>

</body>
</html>
