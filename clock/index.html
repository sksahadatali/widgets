<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clock Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../assets/css/theme.css">
</head>
<body>
  <main class="ey-shell">
    <section class="ey-widget ey-fullscreen-card">
      <div>
        <div class="ey-large-time" id="time">--:--</div>
        <div class="ey-large-date" id="date">Loading</div>
      </div>
    </section>
  </main>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/live-clock.js"></script>
  <script>
    function updateClockWidget() {
      const now = window.eyClock.now();
      document.getElementById("time").textContent = now.timeShort;
      document.getElementById("date").textContent = now.date;
    }
    updateClockWidget();
    setInterval(updateClockWidget, window.eyConfig.refresh.clockMs);
  </script>
</body>
</html>
